name: CI/CD

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master
        paths-ignore:
            - '**.md'
            - 'docs/**'
            - '.github/**'
            - '!.github/workflows/**'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    PNPM_VERSION: 10.18.3
    NODE_VERSION: 22.20.0

jobs:
    install:
        name: Install Dependencies
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache node_modules
              uses: actions/cache/save@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    code-quality:
        name: Code Quality Checks
        needs: install
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Run Prettier
              run: pnpm run -r --parallel --aggregate-output prettier

            - name: Run ESLint
              run: pnpm lint

            - name: Run TypeScript
              run: pnpm tsc

    build-api:
        name: Build API
        needs: [code-quality]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build API
              run: pnpm --filter @sound-connect/api build

    build-web:
        name: Build Web
        needs: [code-quality]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build Web
              run: pnpm --filter @sound-connect/web build
              env:
                  CLOUDFLARE_ENV: production

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: web-build
                  path: apps/web/dist/
                  retention-days: 1

    build-posts-queue:
        name: Build Posts Queue Consumer
        needs: [code-quality]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build Posts Queue Consumer
              run: pnpm --filter @sound-connect/posts-queue-consumer build

    build-notifications-queue:
        name: Build Notifications Queue Consumer
        needs: [code-quality]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build Notifications Queue Consumer
              run: pnpm --filter @sound-connect/notifications-queue-consumer build

    test:
        name: E2E Tests
        needs: install
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm --filter @sound-connect/e2e exec playwright install --with-deps

            - name: Install Playwright system dependencies
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: pnpm --filter @sound-connect/e2e exec playwright install-deps

            - name: Run E2E tests
              id: e2e-tests
              run: |
                  pnpm --filter @sound-connect/e2e test || echo "e2e_failed=true" >> $GITHUB_OUTPUT
                  exit 0

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: e2e/playwright-report/
                  retention-days: 30

            - name: Report E2E test status
              if: always()
              run: |
                  if [[ "${{ steps.e2e-tests.outputs.e2e_failed }}" == "true" ]]; then
                    echo "::error::E2E tests failed but deployment will continue"
                    echo "::notice::Check the Playwright report artifact for details"
                  else
                    echo "::notice::All E2E tests passed successfully"
                  fi

    deploy-api:
        name: Deploy API
        needs: [build-api, test]
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Set Better Auth Secret
              run: |
                  if ! pnpm wrangler secret list --env production 2>/dev/null | grep -q "BETTER_AUTH_SECRET"; then
                      echo "Secret BETTER_AUTH_SECRET does not exist, creating it..."
                      echo "${{ secrets.BETTER_AUTH_SECRET }}" | pnpm wrangler secret put BETTER_AUTH_SECRET --env production
                  else
                      echo "Secret BETTER_AUTH_SECRET already exists, skipping..."
                  fi
              working-directory: apps/api
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Deploy API Worker
              run: pnpm --filter @sound-connect/api run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

            - name: Run Database Migrations
              run: pnpm --filter @sound-connect/api db:migrate:remote
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-web:
        name: Deploy Web
        needs: [build-web, test]
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: web-build
                  path: apps/web/dist/

            - name: Deploy Web Worker
              run: cd apps/web/dist/server && pnpm dlx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-posts-queue:
        name: Deploy Posts Queue Consumer
        needs: [build-posts-queue, test]
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Deploy Posts Queue Consumer Worker
              run: pnpm --filter @sound-connect/posts-queue-consumer run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-notifications-queue:
        name: Deploy Notifications Queue Consumer
        needs: [build-notifications-queue, test]
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Set Resend API Key
              run: |
                  if ! pnpm wrangler secret list --env production 2>/dev/null | grep -q "RESEND_API_KEY"; then
                      echo "Secret RESEND_API_KEY does not exist, creating it..."
                      echo "${{ secrets.RESEND_API_KEY }}" | pnpm wrangler secret put RESEND_API_KEY --env production
                  else
                      echo "Secret RESEND_API_KEY already exists, skipping..."
                  fi
              working-directory: apps/notifications-queue-consumer
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Deploy Notifications Queue Consumer Worker
              run: pnpm --filter @sound-connect/notifications-queue-consumer run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
