name: CI/CD

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    prettier:
        name: Format Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Prettier
              run: pnpm prettier

    lint-api:
        name: Lint API
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint API
              run: pnpm --filter @sound-connect/api lint

    lint-web:
        name: Lint Web
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint Web
              run: pnpm --filter @sound-connect/web lint

    lint-queue:
        name: Lint Queue Consumer
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint Queue Consumer
              run: pnpm --filter @sound-connect/posts-queue-consumer lint

    lint-common:
        name: Lint Common
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint Common
              run: pnpm --filter @sound-connect/common lint

    lint-drizzle:
        name: Lint Drizzle
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint Drizzle
              run: pnpm --filter @sound-connect/drizzle lint

    typecheck-api:
        name: TypeCheck API
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: TypeCheck API
              run: pnpm --filter @sound-connect/api tsc

    typecheck-web:
        name: TypeCheck Web
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: TypeCheck Web
              run: pnpm --filter @sound-connect/web tsc

    typecheck-queue:
        name: TypeCheck Queue Consumer
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: TypeCheck Queue Consumer
              run: pnpm --filter @sound-connect/posts-queue-consumer tsc

    typecheck-common:
        name: TypeCheck Common
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: TypeCheck Common
              run: pnpm --filter @sound-connect/common tsc

    typecheck-drizzle:
        name: TypeCheck Drizzle
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: TypeCheck Drizzle
              run: pnpm --filter @sound-connect/drizzle tsc

    build-api:
        name: Build API
        needs: [lint-api, typecheck-api]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build API
              run: pnpm --filter @sound-connect/api build

    build-web:
        name: Build Web
        needs: [lint-web, typecheck-web]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Web
              run: pnpm --filter @sound-connect/web build
              env:
                  CLOUDFLARE_ENV: production

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: web-build
                  path: apps/web/dist/
                  retention-days: 1

    build-queue:
        name: Build Queue Consumer
        needs: [lint-queue, typecheck-queue]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Queue Consumer
              run: pnpm --filter @sound-connect/posts-queue-consumer build

    # test:
