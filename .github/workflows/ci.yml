name: CI/CD

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master
        paths-ignore:
            - '**.md'
            - 'docs/**'
            - '.github/**'
            - '!.github/workflows/**'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    PNPM_VERSION: 10.18.3
    NODE_VERSION: 22.20.0

jobs:
    install:
        name: Install Dependencies
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache node_modules
              uses: actions/cache/save@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    detect-changes:
        name: Detect Changed Apps
        runs-on: ubuntu-latest
        outputs:
            api: ${{ steps.filter.outputs.api }}
            web: ${{ steps.filter.outputs.web }}
            posts-queue: ${{ steps.filter.outputs.posts-queue }}
            notifications-queue: ${{ steps.filter.outputs.notifications-queue }}
            common: ${{ steps.filter.outputs.common }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check for changes
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      api:
                        - 'apps/api/**'
                        - 'packages/**'
                      web:
                        - 'apps/web/**'
                        - 'packages/**'
                      posts-queue:
                        - 'apps/posts-queue-consumer/**'
                        - 'packages/**'
                      notifications-queue:
                        - 'apps/notifications-queue-consumer/**'
                        - 'packages/**'
                      common:
                        - 'packages/**'

    code-quality:
        name: Code Quality Checks
        needs: [install, detect-changes]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Run Prettier on API
              if: needs.detect-changes.outputs.api == 'true'
              run: pnpm --filter @sound-connect/api prettier

            - name: Run Prettier on Web
              if: needs.detect-changes.outputs.web == 'true'
              run: pnpm --filter @sound-connect/web prettier

            - name: Run Prettier on Posts Queue Consumer
              if: needs.detect-changes.outputs.posts-queue == 'true'
              run: pnpm --filter @sound-connect/posts-queue-consumer prettier

            - name: Run Prettier on Notifications Queue Consumer
              if: needs.detect-changes.outputs.notifications-queue == 'true'
              run: pnpm --filter @sound-connect/notifications-queue-consumer prettier

            - name: Run Prettier on Common packages
              if: needs.detect-changes.outputs.common == 'true'
              run: pnpm --filter @sound-connect/common prettier && pnpm --filter @sound-connect/drizzle prettier

            - name: Run ESLint on API
              if: needs.detect-changes.outputs.api == 'true'
              run: pnpm --filter @sound-connect/api lint

            - name: Run ESLint on Web
              if: needs.detect-changes.outputs.web == 'true'
              run: pnpm --filter @sound-connect/web lint

            - name: Run ESLint on Posts Queue Consumer
              if: needs.detect-changes.outputs.posts-queue == 'true'
              run: pnpm --filter @sound-connect/posts-queue-consumer lint

            - name: Run ESLint on Notifications Queue Consumer
              if: needs.detect-changes.outputs.notifications-queue == 'true'
              run: pnpm --filter @sound-connect/notifications-queue-consumer lint

            - name: Run ESLint on Common packages
              if: needs.detect-changes.outputs.common == 'true'
              run: pnpm --filter @sound-connect/common lint && pnpm --filter @sound-connect/drizzle lint

            - name: Run TypeScript on API
              if: needs.detect-changes.outputs.api == 'true'
              run: pnpm --filter @sound-connect/api tsc

            - name: Run TypeScript on Web
              if: needs.detect-changes.outputs.web == 'true'
              run: pnpm --filter @sound-connect/web tsc

            - name: Run TypeScript on Posts Queue Consumer
              if: needs.detect-changes.outputs.posts-queue == 'true'
              run: pnpm --filter @sound-connect/posts-queue-consumer tsc

            - name: Run TypeScript on Notifications Queue Consumer
              if: needs.detect-changes.outputs.notifications-queue == 'true'
              run: pnpm --filter @sound-connect/notifications-queue-consumer tsc

            - name: Run TypeScript on Common packages
              if: needs.detect-changes.outputs.common == 'true'
              run: pnpm --filter @sound-connect/common tsc && pnpm --filter @sound-connect/drizzle tsc

    build-api:
        name: Build API
        needs: [code-quality, detect-changes]
        if: needs.detect-changes.outputs.api == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build API
              run: pnpm --filter @sound-connect/api build

    build-web:
        name: Build Web
        needs: [code-quality, detect-changes]
        if: needs.detect-changes.outputs.web == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build Web
              run: pnpm --filter @sound-connect/web build
              env:
                  CLOUDFLARE_ENV: production

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: web-build
                  path: apps/web/dist/
                  retention-days: 1

    build-posts-queue:
        name: Build Posts Queue Consumer
        needs: [code-quality, detect-changes]
        if: needs.detect-changes.outputs.posts-queue == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build Posts Queue Consumer
              run: pnpm --filter @sound-connect/posts-queue-consumer build

    build-notifications-queue:
        name: Build Notifications Queue Consumer
        needs: [code-quality, detect-changes]
        if: needs.detect-changes.outputs.notifications-queue == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Build Notifications Queue Consumer
              run: pnpm --filter @sound-connect/notifications-queue-consumer build


    deploy-api:
        name: Deploy API
        needs: [build-api, detect-changes]
        if: |
            needs.detect-changes.outputs.api == 'true' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
            github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Set Better Auth Secret
              run: |
                  if ! pnpm wrangler secret list --env production 2>/dev/null | grep -q "BETTER_AUTH_SECRET"; then
                      echo "Secret BETTER_AUTH_SECRET does not exist, creating it..."
                      echo "${{ secrets.BETTER_AUTH_SECRET }}" | pnpm wrangler secret put BETTER_AUTH_SECRET --env production
                  else
                      echo "Secret BETTER_AUTH_SECRET already exists, skipping..."
                  fi
              working-directory: apps/api
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Deploy API Worker
              run: pnpm --filter @sound-connect/api run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

            - name: Run Database Migrations
              run: pnpm --filter @sound-connect/api db:migrate:remote
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-web:
        name: Deploy Web
        needs: [build-web, detect-changes]
        if: |
            needs.detect-changes.outputs.web == 'true' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
            github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: web-build
                  path: apps/web/dist/

            - name: Deploy Web Worker
              run: cd apps/web/dist/server && pnpm dlx wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-posts-queue:
        name: Deploy Posts Queue Consumer
        needs: [build-posts-queue, detect-changes]
        if: |
            needs.detect-changes.outputs.posts-queue == 'true' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
            github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Deploy Posts Queue Consumer Worker
              run: pnpm --filter @sound-connect/posts-queue-consumer run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    deploy-notifications-queue:
        name: Deploy Notifications Queue Consumer
        needs: [build-notifications-queue, detect-changes]
        if: |
            needs.detect-changes.outputs.notifications-queue == 'true' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
            github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules
              uses: actions/cache/restore@v4
              with:
                  path: |
                      node_modules
                      apps/*/node_modules
                      packages/*/node_modules
                      e2e/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  fail-on-cache-miss: true

            - name: Set Resend API Key
              run: |
                  if ! pnpm wrangler secret list --env production 2>/dev/null | grep -q "RESEND_API_KEY"; then
                      echo "Secret RESEND_API_KEY does not exist, creating it..."
                      echo "${{ secrets.RESEND_API_KEY }}" | pnpm wrangler secret put RESEND_API_KEY --env production
                  else
                      echo "Secret RESEND_API_KEY already exists, skipping..."
                  fi
              working-directory: apps/notifications-queue-consumer
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Deploy Notifications Queue Consumer Worker
              run: pnpm --filter @sound-connect/notifications-queue-consumer run deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
