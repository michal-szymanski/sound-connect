name: CI

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

jobs:
    lint-and-typecheck:
        name: Lint and Type Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Prettier
              run: pnpm prettier

            - name: Run ESLint
              run: pnpm lint

            - name: Run TypeScript checks
              run: pnpm tsc

    test:
        name: E2E Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.20.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: pnpm --filter @sound-connect/e2e exec playwright install --with-deps

            - name: Run E2E tests
              run: pnpm test

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: apps/e2e/playwright-report/
                  retention-days: 30
